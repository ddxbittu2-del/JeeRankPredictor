services:
  - type: web
    name: jee-predictor-api
    env: python
    buildCommand: pip install -r requirements.txt && python scripts/download_data.py --synthetic && python scripts/train_model.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
