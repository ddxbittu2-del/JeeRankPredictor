<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; background: #0f3460; color: #fff; border: none; border-radius: 5px; }
        button:hover { background: #16213e; }
        pre { background: #0f3460; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: #00ff00; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>🔧 JEE Rank Predictor - API Test</h1>
    
    <h2>Backend URL</h2>
    <p id="backend-url"></p>
    
    <h2>Test Buttons</h2>
    <button onclick="testHealth()">1. Test Health Check</button>
    <button onclick="testPredict()">2. Test Prediction</button>
    <button onclick="testGemini()">3. Test Gemini Status</button>
    
    <h2>Results</h2>
    <pre id="results">Waiting for test...</pre>
    
    <script>
        const BACKEND_URL = 'https://jeerankpredictor-02ne.onrender.com';
        document.getElementById('backend-url').textContent = BACKEND_URL;
        
        async function testHealth() {
            try {
                document.getElementById('results').textContent = '⏳ Testing health...';
                const response = await fetch(`${BACKEND_URL}/api/health`);
                const data = await response.json();
                document.getElementById('results').innerHTML = `<span class="success">✅ Health Check Passed!</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('results').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
        
        async function testPredict() {
            try {
                document.getElementById('results').textContent = '⏳ Testing prediction...';
                const response = await fetch(`${BACKEND_URL}/api/predict-rank`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        score: 250,
                        input_type: 'marks',
                        year: 2024,
                        category: 'GEN'
                    })
                });
                const data = await response.json();
                document.getElementById('results').innerHTML = `<span class="success">✅ Prediction Test Passed!</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('results').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
        
        async function testGemini() {
            try {
                document.getElementById('results').textContent = '⏳ Testing Gemini...';
                const response = await fetch(`${BACKEND_URL}/api/gemini/status`);
                const data = await response.json();
                document.getElementById('results').innerHTML = `<span class="success">✅ Gemini Test Passed!</span>\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                document.getElementById('results').innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
